name: Iris ML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-build:

    runs-on: self-hosted

    env:
        AGENT_TOOLSDIRECTORY: /Users/gayus/hostedtoolcache
        RUNNER_TOOL_CACHE: /Users/gayus/hostedtoolcache
    
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training script
        run: |
          python iris_train.py
      - name: Verify artifacts
        run: |
          ls artifacts
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t gsundareshwar/iris-ml-api-new-gitpushed-repository:v1 .

      - name: Push Docker image
        run: |
          docker push gsundareshwar/iris-ml-api-new-gitpushed-repository:v1 
      - name: Deploy to local Kubernetes
        run: |
          kubectl apply -f Kubernetes/
          kubectl rollout restart deployment iris-api-deployment
          kubectl rollout status deployment iris-api-deployment
          kubectl get pods
      - name: Verify API through Kubernetes
        run: |
          kubectl port-forward service/iris-api-service 8000:80 > port-forward.log 2>&1 &
          sleep 10
          curl -f http://localhost:8000/docs
      - name: Verify API through NodePort
        run: |
          sleep 10
          curl -f http://localhost:30080/docs